; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
; Lint-only extras NOT in [project].dependencies. These are only needed by
; the test/lint envs to import-resolve mech-client's optional helpers.
extra_deps =
    py-multibase==1.0.3
    py-multicodec==0.2.1
    open-autonomy[all]==0.21.19

; Repo-specific test discovery. Canonical pytest defaults
; (`integration`/`e2e` markers, `aea.*` DeprecationWarning filter) come
; from tomte's pytest plugin.
[pytest]
addopts =
    -v
    --tb=short
    --strict-markers
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
norecursedirs =
    .tox
    .git
    .eggs
    dist
    build
    packages
    stress_tests
    .venv

[testenv:mkdocs-serve]
skipsdist = True
skip_install = True
deps =
    mkdocs>=1.6.0
    mkdocs-material>=9.5.0
    setuptools<=81.0.0
commands =
    mkdocs serve

[testenv:mkdocs-build]
skipsdist = True
skip_install = True
deps =
    mkdocs>=1.6.0
    mkdocs-material>=9.5.0
    setuptools<=81.0.0
commands =
    mkdocs build --clean

[mypy]
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore

; Repo-specific overrides for libs without type stubs that aren't in
; tomte canonical mypy.ini.
[mypy-google.*]
ignore_missing_imports = True

[mypy-multibase.*]
ignore_missing_imports = True

[mypy-multicodec.*]
ignore_missing_imports = True

[mypy-gql.*]
ignore_missing_imports = True

[mypy-websocket.*]
ignore_missing_imports = True

[mypy-eth_utils.*]
ignore_missing_imports = True

[mypy-eth_typing.*]
ignore_missing_imports = True

[mypy-eth_account.*]
ignore_missing_imports = True

[mypy-dotenv.*]
ignore_missing_imports = True

[mypy-eth_abi.*]
ignore_missing_imports = True

[mypy-hexbytes.*]
ignore_missing_imports = True

[mypy-safe_eth.*]
ignore_missing_imports = True

[mypy-operate.*]
ignore_missing_imports = True

[mypy-packages.*]
ignore_missing_imports = True


[Authorized Packages]
