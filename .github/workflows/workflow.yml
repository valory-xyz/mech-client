name: main_workflow
on:
  push:
    branches:
      - develop
      - main
  pull_request:
permissions:
  contents: read
jobs:
  lock_check:
    continue-on-error: False
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python-version: ["3.10"]
    defaults:
      run:
        shell: bash
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v6
    - name: Check if dependencies can be locked
      run: uv lock --check
    - name: Install dependencies
      run: uv sync --all-groups -v

  linter_checks:
    continue-on-error: False
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.14"]
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - uses: actions/setup-go@v5
      with:
        go-version: "1.17.7"
    - name: Install dependencies
      run:  |
        sudo apt-get update --fix-missing
        sudo apt-get autoremove
        sudo apt-get autoclean
        sudo npm install -g markdown-spellcheck
        pip install tomte[tox,cli]==0.6.2 tox-uv
    - name: Security checks
      run: |
        tox -p -e bandit -e safety
    - name: Code style check
      run: |
        tox -p -e black-check -e isort-check -e flake8 -e vulture
    - name: Static type check
      run: tox -e mypy
    - name: Pylint
      run: tox -e pylint
    - name: Check spelling
      run: tox -e spell-check
    - name: License compatibility check
      run: tox -e liccheck

  test:
    name: Run tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    defaults:
      run:
        shell: bash
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Run unit tests
        run: |
          uv run pytest tests/unit -v --tb=short -k "not trio" --cov=mech_client --cov-report=term-missing --cov-report=xml --cov-fail-under=100
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-24.04' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build-pip-packages:
    name: Dry-release framework
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: |
          sudo apt-get update --fix-missing
          sudo apt-get autoremove
          sudo apt-get autoclean
          python -m pip install --upgrade pip
          pip install twine
          uv sync --all-groups
          uv run autonomy packages sync --update-packages

      - name: Build wheels and source tarball
        run: |
          echo Building distribution
          make dist
