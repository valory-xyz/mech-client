[tool.poetry]
name = "mech-client"
version = "v0.19.3"
description = "Basic client to interact with a mech"
authors = ["David Minarsch <david.minarsch@googlemail.com>"]
readme = "README.md"
packages = [{include = "mech_client"}, {include = "scripts"}]
license = "Apache-2.0"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]

[tool.poetry.dependencies]
python = ">=3.10,<3.15"
gql = ">=3.4.1"
asn1crypto = ">=1.4.0,<1.5.0"
websocket-client = ">=0.32.0,<1"
tabulate = "^0.9.0"
setuptools = "^77.0.3"
olas-operate-middleware = "0.15.2"
safe-eth-py = "^7.18.0"
click = "8.1.8"
jsonschema = ">=4.20.0,<4.24.0"
pydantic = ">=2.12.0"

[tool.poetry.scripts]
mechx = "mech_client.cli.main:cli"

[tool.poetry.group.dev.dependencies]
tomte = {version = "0.6.2", extras = ["tox"]}
pytest-asyncio = "1.3.0"
pytest-cov = "^7.0.0"
mkdocs = "^1.6.0"
mkdocs-material = "^9.5.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
